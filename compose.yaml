services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: dormitory
      POSTGRES_PASSWORD: dormitory
      POSTGRES_DB: dormitory
    ports:
      - "5433:5432"
    volumes:
      - dormitory-postgres:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/01-test-database.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dormitory -d dormitory"]
      interval: 2s
      timeout: 3s
      retries: 20
    restart: unless-stopped

volumes:
  dormitory-postgres:
