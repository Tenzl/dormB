<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width"><title>Courtyard design preview</title><style>@import url('https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;600&family=Geist:wght@400;600&display=swap');*{box-sizing:border-box}body{margin:0;background:#fafaf9;color:#18181b;font:14px Geist,sans-serif}.page{max-width:1120px;margin:auto;padding:56px 24px}.eyebrow{font:10px 'Geist Mono';letter-spacing:.18em;text-transform:uppercase;color:#27765d}h1{max-width:660px;font-size:48px;line-height:.98;letter-spacing:-.045em}section{margin-top:56px;border-top:1px solid #e4e4e7;padding-top:24px}.colors{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px}.swatch{height:112px;border:1px solid #e4e4e7;border-radius:20px;padding:16px;display:flex;align-items:flex-end;font:11px 'Geist Mono'}.components{display:flex;flex-wrap:wrap;gap:12px;align-items:center}button{min-height:44px;border-radius:12px;padding:0 16px;border:1px solid #d4d4d8;background:white;font-weight:600}.primary{background:#18181b;color:white;border-color:#18181b}.badge{border-radius:999px;background:#d1fae5;color:#166534;padding:6px 10px;font:11px 'Geist Mono'}.route{max-width:560px}.stop{display:grid;grid-template-columns:40px 1fr auto;gap:14px;align-items:center;padding:16px 0;border-bottom:1px solid #e4e4e7}.number{display:grid;place-items:center;width:36px;height:36px;border:1px solid #d4d4d8;border-radius:50%;font:11px 'Geist Mono'}.active{background:#27765d;color:white;border-color:#27765d}.muted{color:#71717a;font-size:12px}@media(max-width:767px){.page{padding:32px 16px}h1{font-size:38px}}</style></head><body><main class="page"><p class="eyebrow">Courtyard design system</p><h1>Operational clarity for every campus stop.</h1><section><h2>Palette</h2><div class="colors"><div class="swatch" style="background:#fafaf9">Stone 50</div><div class="swatch" style="background:#fff">White</div><div class="swatch" style="background:#18181b;color:white">Zinc 900</div><div class="swatch" style="background:#27765d;color:white">Accent</div></div></section><section><h2>Actions and state</h2><div class="components"><button class="primary">Confirm route</button><button>Keep current route</button><span class="badge">Ready</span></div></section><section class="route"><p class="eyebrow">Recommended Route</p><div class="stop"><span class="number active">01</span><div><strong>C3 Residence</strong><p class="muted">East lobby canopy · 2 orders</p></div><span class="badge">Next</span></div><div class="stop"><span class="number">02</span><div><strong>D2 Residence</strong><p class="muted">South bicycle court · 1 order</p></div></div></section></main></body></html>
